services:
  calibre-bulk-search:
    build: .
    image: calibre-bulk-search:latest
    container_name: calibre-bulk-search
    ports:
      - "${HOST_PORT:-8085}:8000"
    environment:
      CALIBRE_SERVER_URL: ${CALIBRE_SERVER_URL:-http://192.168.10.50:8722}
      CALIBRE_LIBRARY_ID: ${CALIBRE_LIBRARY_ID:-Calibre-Bibliothek}
      CALIBRE_USERNAME: ${CALIBRE_USERNAME}
      CALIBRE_PASSWORD: ${CALIBRE_PASSWORD}
      CALIBRE_AUTH_MODE: ${CALIBRE_AUTH_MODE:-digest}
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    restart: unless-stopped
    networks:
      - calibre-net

# Join the existing Docker network of the Calibre container so this app can
# reach it by container name on its internal port (e.g. http://calibre:8081),
# bypassing host firewall/NAT. Set CALIBRE_NETWORK to that network's name.
networks:
  calibre-net:
    external: true
    name: ${CALIBRE_NETWORK:-bridge}
