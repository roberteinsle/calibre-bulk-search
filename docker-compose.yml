services:
  calibre-bulk-search:
    build: .
    container_name: calibre-bulk-search
    ports:
      - "${HOST_PORT:-8085}:8000"
    environment:
      CALIBRE_SERVER_URL: ${CALIBRE_SERVER_URL:-http://192.168.10.50:8722}
      CALIBRE_LIBRARY_ID: ${CALIBRE_LIBRARY_ID:-Calibre-Bibliothek}
      CALIBRE_USERNAME: ${CALIBRE_USERNAME}
      CALIBRE_PASSWORD: ${CALIBRE_PASSWORD}
      CALIBRE_AUTH_MODE: ${CALIBRE_AUTH_MODE:-digest}
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    restart: unless-stopped

# --- Optional: Calibre runs on the SAME Docker host ---
# Reaching Calibre via its LAN IP can time out when both containers share a host
# (container-to-host firewall/NAT). In that case, address Calibre by container
# name on its internal port and join its network. To enable:
#   1. Set CALIBRE_SERVER_URL=http://<calibre-container-name>:8081
#   2. Set CALIBRE_NETWORK=<calibre-container-network-name>
#   3. Uncomment the service-level "networks:" entry and the top-level block below.
#
#    networks:
#      - calibre-net
#
# networks:
#   calibre-net:
#     external: true
#     name: ${CALIBRE_NETWORK}
