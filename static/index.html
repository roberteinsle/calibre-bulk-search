<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibre Bulk Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container mt-5">
        <header class="mb-4">
            <h1 class="display-4">📚 Calibre Bulk Search</h1>
            <p class="lead text-muted">Suche mehrere Bücher gleichzeitig in deiner Calibre-Bibliothek</p>
        </header>

        <div class="row">
            <div class="col-md-12">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Buchtitel eingeben</h5>
                        <p class="text-muted small">
                            Ein Titel pro Zeile. Formate: "Titel", "Autor - Titel", "Titel von Autor"
                        </p>
                        <form id="searchForm">
                            <div class="mb-3">
                                <textarea
                                    class="form-control"
                                    id="bookTitles"
                                    rows="10"
                                    placeholder="Drohnenland&#10;Der Schwarm von Frank Schätzing&#10;Stephen King - Es"
                                    required
                                ></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg" id="searchBtn">
                                <span id="searchBtnText">Suchen</span>
                                <span id="searchSpinner" class="spinner-border spinner-border-sm d-none" role="status">
                                    <span class="visually-hidden">Laden...</span>
                                </span>
                            </button>
                            <button type="button" class="btn btn-secondary btn-lg" id="clearBtn">
                                Löschen
                            </button>
                        </form>
                    </div>
                </div>

                <div id="resultsSection" class="d-none">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">Suchergebnisse</h5>
                            <div id="statsBar" class="alert alert-info mb-2">
                                <strong id="statsText"></strong>
                            </div>
                            <div id="serverInfo" class="text-muted small mb-3"></div>
                            <div id="resultsContainer"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-5 mb-3 text-center text-muted">
            <small>Calibre Bulk Search v1.0.1</small>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
